name: X-Ray .NET Agent PR build workflow 

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
            
jobs:
  build:
    name: build
    runs-on: windows-latest
        
    strategy:
      fail-fast: false
      matrix:
        version: [net452,netcoreapp2.0]
                
    steps:
      - name: Checkout repository
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 #v2.7.0
          
      - name: Clean solution
        run: dotnet clean src/AWSXRayRecorder.AutoInstrumentation.sln --configuration Release && dotnet nuget locals all --clear
        
      - name: Install dependencies
        run: dotnet restore src/AWSXRayRecorder.AutoInstrumentation.sln --locked-mode
          
      - name: Build solution
        run: dotnet build src/AWSXRayRecorder.AutoInstrumentation.sln --configuration Release --no-restore
          
      - name: Run tests
        run: dotnet test src/test/bin/Release/${{matrix.version}}/AWSXRayRecorder.AutoInstrumentation.UnitTests.dll

  static-code-checks:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
        with:
          fetch-depth: 0
      - name: Check for versioned GitHub actions
        if: always()
        run: |
          # Get changed GitHub workflow/action files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "^\.github/(workflows|actions)/.*\.ya?ml$" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            # Check for any versioned actions, excluding comments and this validation script
            VIOLATIONS=$(grep -Hn "uses:.*@v" $CHANGED_FILES | grep -v "grep.*uses:.*@v" | grep -v "#.*@v" || true)
            if [ -n "$VIOLATIONS" ]; then
              echo "Found versioned GitHub actions. Use commit SHAs instead:"
              echo "$VIOLATIONS"
              exit 1
            fi
          fi
          
          echo "No versioned actions found in changed files"
